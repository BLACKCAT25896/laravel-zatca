version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-zatca-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel_zatca
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel_password
      - REDIS_HOST=redis
    volumes:
      - ./:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - laravel
    command: php artisan serve --host=0.0.0.0

  db:
    image: mysql:8.0
    container_name: laravel-zatca-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_zatca
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: laravel_password
      MYSQL_USER: laravel
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: laravel-zatca-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

  adminer:
    image: adminer
    container_name: laravel-zatca-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
    driver: local
